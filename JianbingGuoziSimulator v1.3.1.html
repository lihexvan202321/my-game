            margin: 0;
            font-size: 3.2rem;

            color: #2d1907;

            display: inline-block;
            transform: scale(1.3);

        }

            align-items: center;
            padding: 20px;
            position: relative;

            color: #fff1cf;
            font-size: 1.4rem;
            border: 3px solid #6d441f;
            box-shadow: inset 0 2px 8px #ffd58c;

            text-align: center;
            margin-top: 10px;

            border-radius: 40px;
            padding: 8px 25px;

            font-size: 1.2rem;

            color: #ffecb3;

            border: 3px solid #4f321c;

            text-align: center;

            border-radius: 40px;
            padding: 6px 20px;

            cursor: pointer;
            box-shadow: 0 4px 0 #9f612e;

        }

            font-weight: 800;
            color: #3d250d;

        }
        .buildingDesc {
            font-size: 0.85rem;
            opacity: 0.75;
        }

            text-align: center;
            background: #e2c098;
            border-radius: 30px;
            padding: 5px 0;
            font-weight: bold;
            border: 1px solid #9e6d34;

            font-weight: 800;
            font-size: 1.2rem;
            color: #1f1306;

            border: 1px solid #d9944a;

            background: #b87c4b;
            border-radius: 30px;
            padding: 15px;
            margin: 10px 0;
            color: #fff7e0;
            border: 3px solid #7a512a;

            font-weight: bold;

            font-weight: bold;
            color: #2d1b05;
            display: none;
            z-index: 999;

</head>

    // 辅助函数
    function formatNumber(num) {
        if (num >= 1e15) return (num / 1e15).toFixed(2) + 'Qa';
        if (num >= 1e12) return (num / 1e12).toFixed(2) + 'T';
        if (num >= 1e9) return (num / 1e9).toFixed(2) + 'B';
        if (num >= 1e6) return (num / 1e6).toFixed(2) + 'M';
        if (num >= 1e3) return (num / 1e3).toFixed(1) + 'k';
        return Math.floor(num).toString();
    }

    function getPrice(building) {
        let price = building.basePrice * Math.pow(PRICE_INCREASE, building.amount);
        // 季节折扣
        if (currentSeason === 4) price *= 0.9; // 冬至
        return Math.floor(price);
    }

    // 获取建筑倍率
    function getBuildingMult(buildingId) {
        let mult = 1;
        for (let u of upgrades) {
            if (u.bought && u.effect === 'buildingMult' && u.buildingId === buildingId) {
                mult *= u.value;
            }
        }
        return mult;
    }

    // 计算当前CPS
    function calcCps() {
        let cps = 0;
        for (let b of buildings) {
            let mult = getBuildingMult(b.id);
            cps += b.baseCps * b.amount * mult;
        }
        // 全局乘数
        for (let u of upgrades) {
            if (u.bought && u.effect === 'globalCpsMult') {
                cps *= u.value;
            }
        }
        // 龙加成
        let dragonBonus = 1 + dragonLevel * 0.1;
        let dragonBoostUp = upgrades.find(u => u.id === 'u28' && u.bought);
        if (dragonBoostUp) dragonBonus += dragonLevel * 0.2;
        cps *= dragonBonus;
        // 季节加成
        if (currentSeason === 1) cps *= 1.2; // 春节
        // 精华加成
        cps *= essenceMultiplier;
        totalCps = cps;
        return cps;
    }

    // 购买建筑
    function buyBuilding(index) {
        let b = buildings[index];
        let price = getPrice(b);
        if (jianbing >= price) {
            jianbing -= price;
            b.amount += 1;
            calcCps();
            updateUI();
            saveGame();
            checkAchievements();
        }
    }

    // 购买升级
    function buyUpgrade(upgradeId) {
        let up = upgrades.find(u => u.id === upgradeId);
        if (!up || up.bought) return;
        if (jianbing >= up.price) {
            jianbing -= up.price;
            up.bought = true;
            calcCps();
            updateUI();
            saveGame();
            renderUpgrades();
            checkAchievements();
        }
    }

    // 检查成就
    function checkAchievements() {
        for (let a of achievements) {
            if (!a.achieved && a.condition()) {
                a.achieved = true;
                showAchievementPopup(a.name);
            }
        }
        let achievedCount = achievements.filter(a => a.achieved).length;
        achievementCountSpan.textContent = achievedCount;
    }

    function showAchievementPopup(name) {
        achievementPopup.style.display = 'block';
        achievementPopup.textContent = `🏆 解锁成就：${name}`;
        setTimeout(() => {
            achievementPopup.style.display = 'none';
        }, 3000);
    }

    // 金脆煎饼 (出现概率调低)
    function spawnGolden() {
        if (goldenActive) return;
        goldenActive = true;
        messageEl.innerHTML = '✨ 金脆煎饼出现啦！快点击！ ✨';
        let goldenBtn = document.createElement('div');
        goldenBtn.id = 'goldenJianbing';
        goldenBtn.style.position = 'absolute';
        goldenBtn.style.left = Math.random() * 70 + '%';
        goldenBtn.style.top = Math.random() * 40 + '%';
        goldenBtn.style.width = '80px';
        goldenBtn.style.height = '80px';
        goldenBtn.style.background = 'radial-gradient(circle, #ffd966, #ffaa33)';
        goldenBtn.style.borderRadius = '50%';
        goldenBtn.style.boxShadow = '0 0 30px gold, 0 8px 0 #a76800';
        goldenBtn.style.display = 'flex';
        goldenBtn.style.alignItems = 'center';
        goldenBtn.style.justifyContent = 'center';
        goldenBtn.style.fontSize = '2.8rem';
        goldenBtn.style.cursor = 'pointer';
        goldenBtn.style.zIndex = '100';
        goldenBtn.textContent = '🥟';
        goldenBtn.addEventListener('click', function handler(e) {
            e.stopPropagation();
            let reward = 10 + Math.floor(Math.random() * 100) * totalCps * 0.5;
            reward = Math.max(100, Math.floor(reward));
            // 龙鳞金脆升级
            let goldenValueUp = upgrades.find(u => u.id === 'u29' && u.bought);
            if (goldenValueUp) reward *= goldenValueUp.value;
            // 季节中秋加频率，不影响价值
            jianbing += reward;
            goldenClicks++;
            // 除夕烟火可能再生成一个
            let doubleChanceUp = upgrades.find(u => u.id === 'u35' && u.bought);
            let seasonDouble = (currentSeason === 5) ? 0.3 : 0; // 除夕季节
            if ((doubleChanceUp && Math.random() < 0.2) || (seasonDouble && Math.random() < seasonDouble)) {
                setTimeout(() => spawnGolden(), 500);
            }
            goldenActive = false;
            messageEl.innerHTML = '✨ 等待金脆煎饼...';
            this.remove();
            updateUI();
            saveGame();
            checkAchievements();
        });
        document.getElementById('leftClickZone').appendChild(goldenBtn);
        goldenTimer = setTimeout(() => {
            if (goldenActive) {
                let el = document.getElementById('goldenJianbing');
                if (el) el.remove();
                goldenActive = false;
                messageEl.innerHTML = '✨ 金脆煎饼消失了...';
            }
        }, 8000);
    }

    // 金脆生成概率 (调低至0.2%)
    function trySpawnGolden() {
        if (goldenActive) return;
        let freq = 0.002; // 基础0.2%
        for (let u of upgrades) {
            if (u.bought && u.effect === 'goldenFreq') {
                freq *= u.value;
            }
        }
        // 季节中秋
        if (currentSeason === 2) freq *= 1.5;
        // 上限不超过5%
        if (freq > 0.05) freq = 0.05;
        if (Math.random() < freq) {
            spawnGolden();
        }
    }

    // 股票更新
    function updateStock() {
        let change = (Math.random() - 0.45) * 10;
        let stockBoostUp = upgrades.find(u => u.id === 'u30' && u.bought);
        if (stockBoostUp) change *= 1.3;
        stockPrice = Math.max(10, stockPrice + Math.floor(change));
        stockPriceSpan.textContent = stockPrice;
    }

    function buyStock() {
        let cost = stockPrice;
        if (jianbing >= cost) {
            jianbing -= cost;
            stockOwned++;
            stockOwnedSpan.textContent = stockOwned;
            updateUI();
            saveGame();
        }
    }
    function sellStock() {
        if (stockOwned > 0) {
            let gain = stockPrice;
            jianbing += gain;
            profitFromStock += gain;
            stockOwned--;
            stockOwnedSpan.textContent = stockOwned;
            stockProfitSpan.textContent = formatNumber(profitFromStock);
            updateUI();
            saveGame();
            checkAchievements();
        }
    }

    // 煎饼龙喂食
    function feedDragon() {
        if (jianbing >= dragonFeedCost) {
            jianbing -= dragonFeedCost;
            dragonLevel++;
            dragonLevelSpan.textContent = dragonLevel;
            dragonFeedCost = Math.floor(dragonFeedCost * 1.5);
            calcCps();
            updateUI();
            saveGame();
            checkAchievements();
        }
    }

    // 转生
    function ascend() {
        if (jianbing >= 1e6) { // 需要至少100万煎饼才能转生
            essence++;
            essenceSpan.textContent = essence;
            essenceMultiplier = 1 + essence * 0.1; // 每个精华+10%全局产出
            // 重置游戏
            jianbing = 0;
            for (let b of buildings) b.amount = 0;
            for (let u of upgrades) u.bought = false;
            dragonLevel = 0;
            dragonFeedCost = 10;
            stockOwned = 0;
            stockPrice = 100;
            profitFromStock = 0;
            goldenClicks = 0;
            // 保留精华
            calcCps();
            updateUI();
            saveGame();
            renderUpgrades();
        }
    }

    // 季节更新
    function updateSeason() {
        // 每30秒随机更换季节
        currentSeason = Math.floor(Math.random() * SEASONS.length);
        seasonNameSpan.textContent = SEASONS[currentSeason].name;
        seasonEffectSpan.textContent = SEASONS[currentSeason].effect;
    }

    // 渲染建筑列表
    function renderBuildings() {
        let html = '';
        for (let i = 0; i < buildings.length; i++) {
            let b = buildings[i];
            let price = getPrice(b);
            html += `
                <div class="buildingRow" data-id="${i}">
                    <div class="buildingIcon">${b.emoji}</div>
                    <div class="buildingInfo">
                        <div class="buildingName">${b.name}</div>
                        <div class="buildingDesc">${b.desc}</div>
                    </div>
                    <div class="buildingStats">
                        <span>${b.amount}</span><br>
                        <small>${(b.baseCps * getBuildingMult(i)).toFixed(1)}/s</small>
                    </div>
                    <div class="buildingPrice">
                        🥞 <span>${formatNumber(price)}</span>
                    </div>
                    <div class="buyBtn" data-index="${i}">买</div>
                </div>
            `;
        }
        buildingContainer.innerHTML = html;
        document.querySelectorAll('.buyBtn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                let index = btn.getAttribute('data-index');
                if (index !== null) buyBuilding(parseInt(index));
            });
        });
    }

    // 渲染升级面板
    function renderUpgrades() {
        let upgradeDiv = document.getElementById('upgradePanel');
        if (!upgradeDiv) {
            upgradeDiv = document.createElement('div');
            upgradeDiv.id = 'upgradePanel';
            upgradeDiv.style.background = '#dbb47a';
            upgradeDiv.style.borderRadius = '30px';
            upgradeDiv.style.padding = '15px';
            upgradeDiv.style.marginTop = '15px';
            upgradeDiv.style.border = '3px solid #9e6d3b';
            buildingContainer.parentNode.appendChild(upgradeDiv);
        }
        let html = '<h3 style="margin:0 0 10px; text-align:center;">🥫 秘方升级</h3>';
        for (let u of upgrades) {
            if (u.bought) continue;
            html += `
                <div style="display:flex; justify-content:space-between; background:#fff0d4; margin:8px 0; padding:8px 15px; border-radius:40px; align-items:center;">
                    <div><strong>${u.name}</strong><br><small>${u.desc}</small></div>
                    <div style="font-weight:bold; color:#b04f0a;">${formatNumber(u.price)} 🥞</div>
                    <button class="buyUpgradeBtn" data-id="${u.id}" style="background:#f5b06b; border:none; border-radius:30px; padding:8px 20px; font-weight:bold; cursor:pointer;">研究</button>
                </div>
            `;
        }
        upgradeDiv.innerHTML = html;
        document.querySelectorAll('.buyUpgradeBtn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                let id = btn.getAttribute('data-id');
                buyUpgrade(id);
            });
        });
    }

    // 更新UI
    function updateUI() {
        jianbingSpan.textContent = formatNumber(jianbing);
        cpsSpan.textContent = formatNumber(totalCps);
        dragonLevelSpan.textContent = dragonLevel;
        let dragonBonus = 1 + dragonLevel * 0.1;
        if (upgrades.find(u => u.id === 'u28' && u.bought)) dragonBonus += dragonLevel * 0.2;
        dragonMultSpan.textContent = dragonBonus.toFixed(2);
        stockPriceSpan.textContent = stockPrice;
        stockOwnedSpan.textContent = stockOwned;
        stockProfitSpan.textContent = formatNumber(profitFromStock);
        essenceSpan.textContent = essence;

        for (let i = 0; i < buildings.length; i++) {
            let b = buildings[i];
            let row = document.querySelector(`.buildingRow[data-id="${i}"]`);
            if (!row) continue;
            let amountSpan = row.querySelector('.buildingStats span');
            if (amountSpan) amountSpan.textContent = b.amount;
            let priceSpan = row.querySelector('.buildingPrice span');
            if (priceSpan) priceSpan.textContent = formatNumber(getPrice(b));
            let btn = row.querySelector('.buyBtn');
            if (jianbing < getPrice(b)) {
                btn.classList.add('disabled');
            } else {
                btn.classList.remove('disabled');
            }
        }
    }

    // 保存/加载
    const SAVE_KEY = 'jianbing_ultimate_save';

    function saveGame() {
        let data = {
            jianbing: jianbing,
            buildings: buildings.map(b => ({ amount: b.amount })),
            upgrades: upgrades.map(u => ({ id: u.id, bought: u.bought })),
            achievements: achievements.map(a => ({ id: a.id, achieved: a.achieved })),
            goldenClicks: goldenClicks,
            dragonLevel: dragonLevel,
            dragonFeedCost: dragonFeedCost,
            stockPrice: stockPrice,
            stockOwned: stockOwned,
            profitFromStock: profitFromStock,
            essence: essence,
            essenceMultiplier: essenceMultiplier
        };
        localStorage.setItem(SAVE_KEY, JSON.stringify(data));
    }

    function loadGame() {
        try {
            let raw = localStorage.getItem(SAVE_KEY);
            if (!raw) return;
            let data = JSON.parse(raw);
            if (data.jianbing !== undefined) jianbing = data.jianbing;
            if (data.buildings) {
                for (let i = 0; i < data.buildings.length && i < buildings.length; i++) {
                    if (data.buildings[i].amount !== undefined) buildings[i].amount = data.buildings[i].amount;
                }
            }
            if (data.upgrades) {
                for (let su of data.upgrades) {
                    let u = upgrades.find(uu => uu.id === su.id);
                    if (u) u.bought = su.bought;
                }
            }
            if (data.achievements) {
                for (let sa of data.achievements) {
                    let a = achievements.find(aa => aa.id === sa.id);
                    if (a) a.achieved = sa.achieved;
                }
            }
            if (data.goldenClicks !== undefined) goldenClicks = data.goldenClicks;
            if (data.dragonLevel !== undefined) dragonLevel = data.dragonLevel;
            if (data.dragonFeedCost !== undefined) dragonFeedCost = data.dragonFeedCost;
            if (data.stockPrice !== undefined) stockPrice = data.stockPrice;
            if (data.stockOwned !== undefined) stockOwned = data.stockOwned;
            if (data.profitFromStock !== undefined) profitFromStock = data.profitFromStock;
            if (data.essence !== undefined) essence = data.essence;
            if (data.essenceMultiplier !== undefined) essenceMultiplier = data.essenceMultiplier;
        } catch (e) {}
        calcCps();
    }

    // 初始化升级和成就
    upgrades = UPGRADES.slice();
    achievements = ACHIEVEMENTS.slice();

    // 启动
    loadGame();
    renderBuildings();
    renderUpgrades();
    calcCps();
    updateUI();

    // 事件监听
    bigJianbing.addEventListener('click', (e) => {
        e.preventDefault();
        let clickValue = 1;
        let clickMultUp = upgrades.find(u => u.effect === 'clickMult' && u.bought);
        if (clickMultUp) clickValue *= clickMultUp.value;
        // 端午季节
        if (currentSeason === 3) clickValue *= 2;
        jianbing += clickValue;
        updateUI();
        saveGame();
        checkAchievements();
    });

    bigJianbing.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            jianbing += 1;
            updateUI();
            saveGame();
            checkAchievements();
        }
    });

    dragonBtn.addEventListener('click', feedDragon);
    buyStockBtn.addEventListener('click', buyStock);
    sellStockBtn.addEventListener('click', sellStock);
    ascendBtn.addEventListener('click', ascend);

    // 游戏循环
    let lastUpdate = performance.now();
    function gameLoop(now) {
        let delta = (now - lastUpdate) / 1000;
        if (delta >= 0.1) {
            let increment = totalCps * delta;
            jianbing += increment;
            lastUpdate = now;
            updateUI();
        }
        trySpawnGolden();
        requestAnimationFrame(gameLoop);
    }
    requestAnimationFrame(gameLoop);

    // 股票价格更新
    setInterval(() => {
        updateStock();
    }, 5000);

    // 季节更新
    setInterval(() => {
        updateSeason();
    }, 30000);

    setInterval(saveGame, 10000);
    window.addEventListener('beforeunload', saveGame);

    // 成就计数
    let achievedCount = achievements.filter(a => a.achieved).length;
    achievementCountSpan.textContent = achievedCount;

    // 初始化季节
    updateSeason();
})();
</script>
</body>
</html>
