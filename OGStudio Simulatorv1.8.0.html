</div>

                eventActive=wasEventActive;
                if(success!==false){
                    D.eventOpts.innerHTML='';
                    eventActive=false;
                    curEvent=null;
                    D.nextWeek.disabled=false;
                    rT();r();
                } else {
                    eventActive=true;
                }
            };
            D.eventOpts.appendChild(btn);
        });
        let cancelBtn=document.createElement('button');
        cancelBtn.className='event-option-btn';
        cancelBtn.innerText='❌ 取消';
        cancelBtn.onclick=()=>{D.eventOpts.innerHTML='';eventActive=false;curEvent=null;D.nextWeek.disabled=false;log('已取消');};
        D.eventOpts.appendChild(cancelBtn);

        eventActive=true;
        curEvent=null;
        D.nextWeek.disabled=true;
        r();
    };

    const bA=()=>{
        $('restart').onclick=()=>p(1,()=>c(5,2,-10,0),'重启服务');
        $('compensate').onclick=()=>p(1,()=>c(0,8,-5,-50),'补偿玩家');
        $('rest').onclick=()=>p(1,()=>c(-3,0,15,0),'休息');
        $('emergency').onclick=()=>p(1,()=>c(20,-10,-20,0),'紧急重启');
        $('buyServer').onclick=()=>{if(!gameActive||eventActive)return;if(S.ap<1){log('行动点不足');return}if(!S.infinite&&S.mon<200){log('资金不足');return}S.ap--;S.infinite||(S.mon-=200);c(15,0,-5,0);log('购买备用服务器');r()};
        $('hostEvent').onclick=()=>{if(!gameActive||eventActive)return;if(S.ap<1){log('行动点不足');return}if(!S.infinite&&S.mon<150){log('资金不足');return}S.ap--;S.infinite||(S.mon-=150);c(-5,20,-10,0);log('举办玩家活动');r()};
        $('updateGame').onclick=sU;
        $('expandDisk').onclick=()=>{if(!gameActive||eventActive)return;if(S.ap<1){log('行动点不足');return}if(!S.infinite&&S.mon<200){log('资金不足');return}S.ap--;S.infinite||(S.mon-=200);S.diskTotal+=200;log('硬盘扩容+200GB');r()};
        $('lend').onclick=()=>{if(!gameActive||eventActive)return;if(S.ap<3){log('行动点不足');return}S.ap-=3;c(-5,-5,-5,800);log('出借冗余资源，获得800资金');r()};
        D.nextWeek.onclick=w;
    };

    const reset=()=>{
        studio=$('studioName').value.trim()||'无名';game=$('gameTitle').value.trim()||'无名';type=$('gameType').value;
        let base={tower:{stab:85,sat:60,eng:75,mon:1000,disk:1200},moba:{stab:60,sat:70,eng:70,mon:1500,disk:800},rpg:{stab:65,sat:85,eng:85,mon:1100,disk:1000},fps:{stab:60,sat:70,eng:75,mon:1400,disk:900},slg:{stab:80,sat:65,eng:70,mon:900,disk:1100},mmo:{stab:70,sat:75,eng:70,mon:1100,disk:1100},card:{stab:65,sat:80,eng:85,mon:1000,disk:900},battle:{stab:60,sat:75,eng:70,mon:1300,disk:900},openworld:{stab:70,sat:65,eng:75,mon:900,disk:1500}}[type]||base.tower;
        S={stab:base.stab,sat:base.sat,eng:base.eng,mon:base.mon,players:1200,load:45,week:0,eventCnt:0,ap:3,crashed:!1,crashWeeks:0,infinite:game==='美食大战老鼠'&&type==='tower',lastCrash:0,diskTotal:base.disk,engineers:{},techs:{},unlock:{},ub:{moneyM:1,satDelta:0,diskCost:.5,name:'基础版本'}};
        EGS.forEach(e=>S.engineers[e.id]=!1);TCHS.forEach(t=>S.techs[t.id]=!1);UKEYS.forEach(k=>S.unlock[k]=!1);
        S.infinite&&(S.mon=999999,log('🍔 彩蛋激活！资金无限，每7周崩溃！'));
        gameActive=!0;eventActive=!1;curEvent=null;window.eventProbMult=1;
        D.eventOpts.innerHTML='';D.nextWeek.disabled=!1;D.eventLog.innerHTML=`<div class="log-entry"><span class="log-time">[第0周]</span> 工作室开业！类型：${$('gameType').options[$('gameType').selectedIndex].text}</div>`;
        updateTypeEffect();rE();rT();r();
    };

    $('gameType').addEventListener('change',updateTypeEffect);

    let engC=!1,techC=!1;D.collapseEng.onclick=()=>{engC=!engC;D.engContent.classList.toggle('hidden-content',engC);D.collapseEng.textContent=engC?'▶':'▼'};D.collapseTech.onclick=()=>{techC=!techC;D.techContent.classList.toggle('hidden-content',techC);D.collapseTech.textContent=techC?'▶':'▼'};

    $('startGame').onclick=reset;$('reset').onclick=reset;
    bA();reset();
})();
</script>
